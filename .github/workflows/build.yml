########################################################################
# Build libstiles for every target OS/arch on real hardware.
#
# GitHub Actions rents you the machines you don't own (real Intel + Apple
# Silicon Macs, real Linux), builds NATIVELY on each — no cross-compiling —
# and collects the .so/.dylib as downloadable artifacts.
#
# WHY no AVX2-vs-AVX512 matrix here: sTiles' hot FLOPs live in MKL/libxsmm,
# which pick their widest CPU kernels at RUNTIME. So one portable build per
# platform (MARCH=avx2 on x86, apple-m1 on ARM) is optimal; a per-ISA build
# matrix or target_clones would add complexity for ~0% speedup. See
# docs note in the repo (memory: stiles-build-system-overhaul).
#
# BLAS per platform (auto-detected by make.inc):
#   Linux x86_64  -> Intel MKL (embedded static, self-contained .so)
#   macOS Intel   -> Homebrew OpenBLAS (+ lapack for LAPACKE)
#   macOS Apple   -> Homebrew OpenBLAS (+ lapack for LAPACKE)
#
# Trigger: on every push/tag, or manually from the Actions tab.
########################################################################
name: build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:        # lets you run it by hand from the Actions tab

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false      # one platform failing must not cancel the others
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            arch: x86_64
          - name: macos-intel-x86_64
            os: macos-13     # last Intel macOS runner
            arch: x86_64
          - name: macos-apple-arm64
            os: macos-14     # Apple Silicon (M1) runner
            arch: arm64
          # Optional: uncomment for a Linux arm64 (.so) build too.
          # - name: linux-arm64
          #   os: ubuntu-24.04-arm
          #   arch: arm64

    steps:
      - uses: actions/checkout@v4
        # SCOTCH/METIS/SuiteSparse are vendored as plain in-tree sources,
        # not git submodules, so no submodule fetch is needed.

      # ---- Linux deps: gcc/gfortran, hwloc, numa, SCOTCH compression libs ----
      - name: Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++ gfortran make pkg-config \
            libhwloc-dev libnuma-dev \
            zlib1g-dev libbz2-dev liblzma-dev

      # ---- Linux BLAS: Intel oneAPI MKL (embedded statically into the .so) ----
      # Simpler alternative: replace this whole step with
      #   sudo apt-get install -y libopenblas-dev liblapacke-dev
      # and make.inc auto-detects OpenBLAS instead (dynamic dep, no embedding).
      - name: Install Intel MKL (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
            | gpg --dearmor | sudo tee /usr/share/keyrings/oneapi.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/oneapi.gpg] https://apt.repos.intel.com/oneapi all main" \
            | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update
          sudo apt-get install -y intel-oneapi-mkl-devel

      # ---- macOS deps: gfortran + libomp + hwloc + OpenBLAS from Homebrew ----
      # BLAS = Homebrew OpenBLAS (+ lapack for the LAPACKE C interface). Apple's
      # Accelerate ships CBLAS and Fortran LAPACK but NOT LAPACKE, which sTiles
      # needs, so we use OpenBLAS (make.inc auto-detects it ahead of Accelerate).
      - name: macOS deps
        if: runner.os == 'macOS'
        run: brew install gcc libomp hwloc openblas lapack

      # ---- Build (make.inc auto-detects platform, arch, BLAS, OpenMP) --------
      # USE_LIBXSMM=0 on macOS: libxsmm's build clones its unstable `main` branch
      # and compiles it with -Werror under the newest brew compilers, which is
      # fragile on macOS. libxsmm is an OPTIONAL selinv accelerator — without it
      # sTiles falls back to cblas_dgemm (OpenBLAS), so the build stays robust.
      - name: Build libstiles
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            source /opt/intel/oneapi/setvars.sh || true
            MAKEARGS="MARCH=avx2"                       # portable x86_64
          elif [ "${{ matrix.arch }}" = "arm64" ]; then
            MAKEARGS="USE_LIBXSMM=0"                    # Apple Silicon (-mcpu=apple-m1)
          else
            MAKEARGS="MARCH=avx2 USE_LIBXSMM=0"         # Intel Mac
          fi
          # Capture the full (very verbose) build to a file; on failure surface
          # ONLY the errors + tail so the CI log stays short and readable
          # (make echoes every ~2 KB compile command, which otherwise buries the
          # actual error past the log size limit).
          if ! make dist $MAKEARGS > build.log 2>&1; then
            echo "::group::❌ Errors"
            grep -nE "error:|fatal error:| Error [0-9]+|undefined (symbols?|reference)|ld: |Undefined symbol" build.log || true
            echo "::endgroup::"
            echo "::group::Last 40 lines of build.log"
            tail -40 build.log
            echo "::endgroup::"
            exit 1
          fi
          tail -3 build.log

      - name: Sanity check the built library
        run: |
          ls -lh dist/lib/
          if [ "${{ runner.os }}" = "macOS" ]; then otool -L dist/lib/libstiles.dylib; \
          else ldd dist/lib/libstiles.so; fi

      # Prove the library actually WORKS on this OS/arch (not just that it
      # compiled): factorize + logdet + selinv + solve on a few matrices and
      # gate on the solve residual. `make dist` already produced lib/libstiles.*.
      - name: Smoke test (speed + correctness)
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then source /opt/intel/oneapi/setvars.sh || true; fi
          cd bench && ./run.sh

      # Nested parallelism: run several Cholesky factorizations CONCURRENTLY,
      # each on its own cores (the INLA "groups" pattern). Checks every call
      # returns the same logdet and reports the serial-vs-concurrent speedup.
      # Kept modest (<= runner core count) so concurrency is real, not
      # oversubscribed: hosted runners have ~3-4 cores.
      - name: Parallel factorization test (concurrent chols)
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then source /opt/intel/oneapi/setvars.sh || true; fi
          export OMP_STACKSIZE=256M   # big OMP-thread stack (macOS default backend)
          cd bench
          make -s parallel_chol
          echo "### 2 concurrent factorizations x 2 cores each"
          ./parallel_chol mats/ferris.mtx 2 2
          echo "### 4 concurrent factorizations x 1 core each"
          ./parallel_chol mats/ferris.mtx 4 1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libstiles-${{ matrix.name }}
          path: |
            dist/lib/libstiles.*
            dist/include/stiles.h
            dist/lib/pkgconfig/stiles.pc

  # Diagnostic: build libstiles with AddressSanitizer on Apple Silicon and run
  # the ordering-only driver on spacetime. SCOTCH corrupts the heap on arm64 for
  # that matrix, but the identical run is CLEAN on Linux under both ASan and
  # Valgrind — so the bug only exists in real arm64 execution. ASan instruments
  # the arm64 code, so it prints the exact SCOTCH file:line that overflows, which
  # is what we need to fix it. Non-gating (continue-on-error): purely a probe.
  macos-asan-scotch:
    name: macos-asan-scotch-diagnostic
    runs-on: macos-14           # Apple Silicon
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: deps
        run: brew install gcc libomp hwloc openblas lapack
      - name: Build libstiles with AddressSanitizer
        run: make BUILD=sanitize USE_LIBXSMM=0 all
      - name: Build order_only (ASan) and run spacetime ordering
        run: |
          cd bench
          # Match the library's ASan so the runtime is consistent across the .dylib boundary.
          clang++ -std=c++20 -O1 -g -fsanitize=address -fno-omit-frame-pointer \
            -I../tools/include -o order_only order_only.cpp \
            -L../lib -lstiles -Wl,-rpath,../lib
          export ASAN_OPTIONS="detect_leaks=0:abort_on_error=1:halt_on_error=1:symbolize=1"
          echo "::group::ASan — spacetime ordering (SCOTCH overflow expected here)"
          STILES_SCOTCH_CTX=0 ./order_only mats/spacetime.mtx 1 40 || true
          echo "::endgroup::"
          echo "::group::ASan — spacetime with SCOTCH context ON"
          STILES_SCOTCH_CTX=1 ./order_only mats/spacetime.mtx 1 40 || true
          echo "::endgroup::"

  # Optional: merge the two macOS builds into one universal (fat) dylib that
  # runs on both Intel and Apple Silicon. Delete this job if you'd rather ship
  # the two separate dylibs.
  macos-universal:
    needs: build
    runs-on: macos-14
    steps:
      - uses: actions/download-artifact@v4
        with: { name: libstiles-macos-intel-x86_64, path: intel }
      - uses: actions/download-artifact@v4
        with: { name: libstiles-macos-apple-arm64, path: arm }
      - name: lipo into a universal dylib
        run: |
          mkdir -p universal
          lipo -create intel/dist/lib/libstiles.dylib arm/dist/lib/libstiles.dylib \
               -output universal/libstiles.dylib
          lipo -info universal/libstiles.dylib
      - uses: actions/upload-artifact@v4
        with:
          name: libstiles-macos-universal
          path: universal/libstiles.dylib
