########################################################################
# Build libstiles for every target OS/arch on real hardware.
#
# GitHub Actions rents you the machines you don't own (Apple Silicon Mac, real
# Linux), builds NATIVELY on each — no cross-compiling — and collects the
# .so/.dylib as downloadable artifacts.
#
# Two native builds ship: linux-x86_64 and macos-apple-arm64. There is no
# Intel-Mac build: GitHub is retiring the Intel (macos-13) runners, so that job
# just hangs forever waiting for a machine. The Linux x86_64 build already gives
# full AVX2 x86_64 performance, and arm64 covers every modern Mac (see the note
# on the matrix below for how to add Intel back if you ever need it).
#
# WHY no AVX2-vs-AVX512 matrix here: sTiles' hot FLOPs live in MKL/libxsmm,
# which pick their widest CPU kernels at RUNTIME. So one portable build per
# platform (MARCH=avx2 on x86, apple-m1 on ARM) is optimal; a per-ISA build
# matrix or target_clones would add complexity for ~0% speedup. See
# docs note in the repo (memory: stiles-build-system-overhaul).
#
# BLAS per platform (auto-detected by make.inc):
#   Linux x86_64  -> Intel MKL (embedded static, self-contained .so)
#   macOS Apple   -> Homebrew OpenBLAS (+ lapack for LAPACKE)
#
# Trigger: on every push/tag, or manually from the Actions tab.
########################################################################
name: build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:        # lets you run it by hand from the Actions tab

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false      # one platform failing must not cancel the others
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            arch: x86_64
          - name: macos-apple-arm64
            os: macos-14           # Apple Silicon (M1) runner
            arch: arm64
          - name: linux-arm64
            os: ubuntu-24.04-arm   # GitHub arm64 Linux runner (free on public repos)
            arch: arm64
          # NOTE: no macos-intel-x86_64 job. GitHub is retiring the Intel
          # (macos-13) runners, so that job just sits in the queue forever
          # ("waiting for a runner"). The Linux x86_64 build already ships full
          # AVX2 x86_64 performance for x86 users, and arm64 (Mac + Linux) covers
          # ARM. To add a native Intel-Mac dylib back, restore a macos-13 entry
          # (if runners return) or cross-build x86_64 on the arm64 runner via a
          # Rosetta x86_64 toolchain (needs x86_64 gfortran for the Fortran AMD).

    steps:
      - uses: actions/checkout@v4
        # SCOTCH/METIS/SuiteSparse are vendored as plain in-tree sources,
        # not git submodules, so no submodule fetch is needed.

      # ---- Linux deps: gcc/gfortran, hwloc, numa, SCOTCH compression libs ----
      - name: Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++ gfortran make pkg-config \
            libhwloc-dev libnuma-dev \
            zlib1g-dev libbz2-dev liblzma-dev

      # ---- Linux BLAS: Intel oneAPI MKL (embedded statically into the .so) ----
      # Simpler alternative: replace this whole step with
      #   sudo apt-get install -y libopenblas-dev liblapacke-dev
      # and make.inc auto-detects OpenBLAS instead (dynamic dep, no embedding).
      - name: Install Intel MKL (Linux x86_64)
        if: runner.os == 'Linux' && matrix.arch == 'x86_64'
        run: |
          wget -qO- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
            | gpg --dearmor | sudo tee /usr/share/keyrings/oneapi.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/oneapi.gpg] https://apt.repos.intel.com/oneapi all main" \
            | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update
          sudo apt-get install -y intel-oneapi-mkl-devel

      # ---- Linux arm64 BLAS: OpenBLAS (MKL is x86-only). make.inc auto-detects
      # OpenBLAS via pkg-config; the .so links it dynamically. ----
      - name: Install OpenBLAS (Linux arm64)
        if: runner.os == 'Linux' && matrix.arch == 'arm64'
        run: sudo apt-get install -y libopenblas-dev liblapacke-dev

      # ---- macOS deps: gfortran + libomp + hwloc + OpenBLAS from Homebrew ----
      # BLAS = Homebrew OpenBLAS (+ lapack for the LAPACKE C interface). Apple's
      # Accelerate ships CBLAS and Fortran LAPACK but NOT LAPACKE, which sTiles
      # needs, so we use OpenBLAS (make.inc auto-detects it ahead of Accelerate).
      - name: macOS deps
        if: runner.os == 'macOS'
        run: brew install gcc libomp hwloc openblas lapack dylibbundler

      # ---- Build (make.inc auto-detects platform, arch, BLAS, OpenMP) --------
      # USE_LIBXSMM=0 on macOS: libxsmm's build clones its unstable `main` branch
      # and compiles it with -Werror under the newest brew compilers, which is
      # fragile on macOS. libxsmm is an OPTIONAL selinv accelerator — without it
      # sTiles falls back to cblas_dgemm (OpenBLAS), so the build stays robust.
      - name: Build libstiles
        run: |
          if [ "${{ runner.os }}" = "Linux" ] && [ "${{ matrix.arch }}" = "x86_64" ]; then
            source /opt/intel/oneapi/setvars.sh || true
            MAKEARGS="MARCH=avx2"                       # Linux x86_64: MKL + AVX2
          else
            # Linux arm64 (OpenBLAS) & macOS Apple Silicon (-mcpu=apple-m1).
            # USE_LIBXSMM=0: skip the fragile libxsmm clone/build on arm64.
            MAKEARGS="USE_LIBXSMM=0"
          fi
          # Capture the full (very verbose) build to a file; on failure surface
          # ONLY the errors + tail so the CI log stays short and readable
          # (make echoes every ~2 KB compile command, which otherwise buries the
          # actual error past the log size limit).
          if ! make dist $MAKEARGS > build.log 2>&1; then
            echo "::group::❌ Errors"
            grep -nE "error:|fatal error:| Error [0-9]+|undefined (symbols?|reference)|ld: |Undefined symbol" build.log || true
            echo "::endgroup::"
            echo "::group::Last 40 lines of build.log"
            tail -40 build.log
            echo "::endgroup::"
            exit 1
          fi
          tail -3 build.log

      # ---- Make the macOS dylib SELF-CONTAINED (no Homebrew needed to run) ----
      # The Linux .so embeds MKL statically, but the macOS .dylib links Homebrew
      # OpenBLAS / LAPACKE / libomp / hwloc / gfortran dynamically by absolute
      # path (/opt/homebrew/...), so it won't load on a Mac without those kegs.
      # dylibbundler copies every non-system dependency (recursively) next to
      # libstiles.dylib and rewrites its load commands to @loader_path, so the
      # library finds its deps beside itself. Result: the artifact runs on ANY
      # Apple-Silicon Mac with no Homebrew. (Static-embedding libgfortran on
      # macOS is fragile; bundling is the robust, standard approach.)
      - name: Bundle runtime deps into the macOS dylib (self-contained)
        if: runner.os == 'macOS'
        run: |
          echo "::group::deps BEFORE bundling"
          otool -L dist/lib/libstiles.dylib || true
          echo "::endgroup::"
          # libstiles.so is a symlink to the dylib; operate on the real file.
          # </dev/null: if dylibbundler can't resolve a dep it prompts for a
          # path interactively; EOF turns that would-be hang into a fast fail.
          dylibbundler --overwrite-files --bundle-deps --create-dir \
            --fix-file dist/lib/libstiles.dylib \
            --dest-dir dist/lib \
            --install-path @loader_path/ </dev/null
          echo "::group::deps AFTER bundling"
          otool -L dist/lib/libstiles.dylib
          ls -lh dist/lib/
          echo "::endgroup::"
          # Assert nothing outside the bundle / system paths remains, in the
          # dylib OR any bundled dependency (dylibbundler fixes them recursively).
          if otool -L dist/lib/*.dylib | grep -E '/opt/homebrew|/usr/local/(opt|Cellar)|/opt/intel'; then
            echo "::error::a third-party dylib dependency is still referenced by absolute path"
            exit 1
          fi
          echo "OK: macOS dylib is self-contained (@loader_path + system libs only)"

      - name: Sanity check the built library
        run: |
          ls -lh dist/lib/
          if [ "${{ runner.os }}" = "macOS" ]; then otool -L dist/lib/libstiles.dylib; \
          else ldd dist/lib/libstiles.so; fi

      # Prove the library actually WORKS on this OS/arch (not just that it
      # compiled): factorize + logdet + selinv + solve on a few matrices and
      # gate on the solve residual. `make dist` already produced lib/libstiles.*.
      - name: Smoke test (speed + correctness)
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then source /opt/intel/oneapi/setvars.sh || true; fi
          cd bench && ./run.sh

      # Nested parallelism: run several Cholesky factorizations CONCURRENTLY,
      # each on its own cores (the nested-groups pattern). Checks every call
      # returns the same logdet and reports the serial-vs-concurrent speedup.
      # Kept modest (<= runner core count) so concurrency is real, not
      # oversubscribed: hosted runners have ~3-4 cores.
      - name: Parallel factorization test (concurrent chols)
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then source /opt/intel/oneapi/setvars.sh || true; fi
          export OMP_STACKSIZE=256M   # big OMP-thread stack (macOS default backend)
          cd bench
          make -s parallel_chol
          echo "### 2 concurrent factorizations x 2 cores each"
          ./parallel_chol mats/ferris.mtx 2 2
          echo "### 4 concurrent factorizations x 1 core each"
          ./parallel_chol mats/ferris.mtx 4 1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libstiles-${{ matrix.name }}
          path: |
            dist/lib/libstiles.*
            dist/lib/*.dylib
            dist/include/stiles.h
            dist/lib/pkgconfig/stiles.pc

  # Regression guard: build libstiles with AddressSanitizer on Apple Silicon and
  # run the ordering-only driver on spacetime under ASan. This is the matrix that
  # exposed the arm64 SCOTCH bug (the opaque SCOTCH_Ordering blob in scotch.h was
  # sized on Linux, 24 B too small for macOS where LibOrder embeds a bigger
  # pthread_mutex_t -> stack overflow at -O2/-O3). Fixed by bumping dummy[17]->
  # dummy[24]; this job stays as a guard so a future SCOTCH/scotch.h change that
  # re-introduces the undersize is caught here. Non-gating (continue-on-error).
  macos-asan-scotch:
    name: macos-asan-scotch-diagnostic
    runs-on: macos-14           # Apple Silicon
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: deps
        run: brew install gcc libomp hwloc openblas lapack
      - name: Build libstiles with AddressSanitizer
        run: make BUILD=sanitize USE_LIBXSMM=0 all
      - name: Build order_only (ASan) and run spacetime ordering
        run: |
          cd bench
          # Match the library's ASan so the runtime is consistent across the .dylib boundary.
          clang++ -std=c++20 -O1 -g -fsanitize=address -fno-omit-frame-pointer \
            -I../tools/include -o order_only order_only.cpp \
            -L../lib -lstiles -Wl,-rpath,../lib
          export ASAN_OPTIONS="detect_leaks=0:abort_on_error=1:halt_on_error=1:symbolize=1"
          echo "::group::ASan — spacetime ordering (SCOTCH overflow expected here)"
          STILES_SCOTCH_CTX=0 ./order_only mats/spacetime.mtx 1 40 || true
          echo "::endgroup::"
          echo "::group::ASan — spacetime with SCOTCH context ON"
          STILES_SCOTCH_CTX=1 ./order_only mats/spacetime.mtx 1 40 || true
          echo "::endgroup::"

  # Windows portability PROBE (diagnostic, non-gating). Compile-checks sTiles'
  # OWN C++ sources with the MinGW-w64 UCRT64 toolchain (x86_64-w64-mingw32ucrt-*,
  # the standard Rtools44 toolchain). It does NOT build a .dll and runs nothing:
  # it reports which sTiles sources still assume Linux/POSIX (ungated
  # sched_setaffinity / numa / mmap / dlopen ...) and so must be gated before a
  # Windows build is possible. This is how we MEASURE the gap; it is not the
  # port. continue-on-error so the full error list surfaces instead of blocking
  # CI. BLAS here is MSYS2's OpenBLAS (headers only — the probe is syntax-only,
  # no link); a real Windows build provides Windows MKL/OpenBLAS at its own
  # final link.
  windows-mingw-probe:
    name: windows-mingw-probe-diagnostic
    runs-on: windows-latest
    continue-on-error: true
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - name: Set up MSYS2 UCRT64 (MinGW-w64 — the UCRT64 / Rtools44 Windows toolchain)
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            make
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-gcc-fortran
            mingw-w64-ucrt-x86_64-openblas
            mingw-w64-ucrt-x86_64-hwloc
            mingw-w64-ucrt-x86_64-pkgconf
      - name: Show toolchain + resolved build config
        run: |
          g++ --version | head -1
          x86_64-w64-mingw32-g++ --version 2>/dev/null | head -1 || true
          make show-config USE_LIBXSMM=0 || true
      - name: Compile probe — sTiles-own sources under MinGW (syntax-only)
        run: make cross-syntax USE_LIBXSMM=0
      - name: Surface the Windows portability gap
        if: always()
        run: |
          echo "::group::MinGW compiler errors (cross-syntax.err)"
          if [ -s cross-syntax.err ]; then cat cross-syntax.err; \
          else echo "(no errors — every sTiles-own source compiled under MinGW)"; fi
          echo "::endgroup::"
      - name: Upload probe log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-mingw-probe-log
          path: cross-syntax.err
          if-no-files-found: ignore
