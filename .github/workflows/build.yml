########################################################################
# Build libstiles for every target OS/arch on real hardware.
#
# GitHub Actions rents you the machines you don't own (Apple Silicon Mac, real
# Linux), builds NATIVELY on each — no cross-compiling — and collects the
# .so/.dylib as downloadable artifacts.
#
# Four native builds ship: linux-x86_64 (static MKL), linux-arm64 (static
# OpenBLAS), macos-apple-arm64 (Homebrew OpenBLAS), and macos-intel-x86_64
# (Homebrew OpenBLAS on GitHub's macos-15-intel runner — the last x86_64 mac
# image, supported ~until Aug 2027). Intel Macs need a native x86_64 dylib
# because an arm64 dylib can't load into an x86_64 Python/R process.
#
# WHY no AVX2-vs-AVX512 matrix here: sTiles' hot FLOPs live in MKL/libxsmm,
# which pick their widest CPU kernels at RUNTIME. So one portable build per
# platform (MARCH=avx2 on x86, apple-m1 on ARM) is optimal; a per-ISA build
# matrix or target_clones would add complexity for ~0% speedup. See
# docs note in the repo (memory: stiles-build-system-overhaul).
#
# BLAS per platform (auto-detected by make.inc):
#   Linux x86_64  -> Intel MKL (embedded static, self-contained .so)
#   Linux arm64   -> pinned OpenBLAS built from source in-workflow (serial,
#                    DYNAMIC_ARCH => runtime Neoverse/Graviton kernel dispatch),
#                    embedded static: same self-contained story as MKL on x86
#   macOS Apple   -> Homebrew OpenBLAS (+ lapack for LAPACKE)
#
# Every build job appends its speed table (+ CPU model) to the run summary, so
# performance across commits — and Intel-vs-AMD runner luck — is visible without
# log digging. Two extra diagnostics answer standing performance questions:
#   macos-accelerate-bench   does Accelerate (Apple AMX) beat OpenBLAS here?
#   linux-x86-blas-compare   does MKL beat OpenBLAS on this (Intel or AMD)
#                            runner? (workflow_dispatch only)
# blas-override-tests (GATING, unlike the diagnostics) proves every BLAS
# override knob resolves to the right backend (fake install trees; precedence
# incl. override-beats-autodetect) and that an overridden build factors ferris.
# On v* tags, the release job attaches every artifact to the GitHub Release
# (workflow artifacts alone expire after 90 days).
#
# Trigger: on every push/tag, or manually from the Actions tab.
########################################################################
name: build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:        # lets you run it by hand from the Actions tab

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    # Run the job inside matrix.container when set (empty => directly on the
    # runner). linux-x86_64 builds in manylinux_2_28 (glibc 2.28) so the .so
    # runs on essentially every x86-64 Linux since ~2018 (RHEL/Rocky 8+, Ubuntu
    # 20.04+, Debian 11+, ibex). Combined with the full-static link (below) the
    # artifact carries no GLIBCXX / libstdc++ / libbz2-soname floor either.
    container: ${{ matrix.container }}
    # SCOTCH file-compression (gz/bz2/lzma) is unused by sTiles. The portable
    # x86_64 artifact (manylinux container) drops it (=0) so the .so carries no
    # libbz2 soname dep; other targets keep it (=1). One source of truth: the
    # library build, speedtest, and parallel_chol all read this env (via the
    # STILES_SCOTCH_COMPRESS ?= 1 in make.inc / bench.inc / tools/process).
    env:
      STILES_SCOTCH_COMPRESS: ${{ matrix.container && '0' || '1' }}
      # Pinned OpenBLAS for the arm64 from-source build (also the cache key).
      OPENBLAS_VERSION: v0.3.29
    strategy:
      fail-fast: false      # one platform failing must not cancel the others
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            arch: x86_64
            container: quay.io/pypa/manylinux_2_28_x86_64
          - name: macos-apple-arm64
            os: macos-14           # Apple Silicon (M1) runner
            arch: arm64
          - name: linux-arm64
            os: ubuntu-24.04-arm   # GitHub arm64 Linux runner (free on public repos)
            arch: arm64
            # Same portability treatment as x86_64: build in manylinux_2_28
            # (AlmaLinux 8 aarch64, glibc 2.28) so the .so runs on essentially
            # every arm64 Linux since ~2018 — the bare Ubuntu 24.04 runner
            # would bake in a glibc 2.39 floor.
            container: quay.io/pypa/manylinux_2_28_aarch64
          - name: macos-intel-x86_64
            os: macos-15-intel     # GitHub's Intel (x86_64) macOS runner: GA, the
                                   # LAST x86_64 mac image (supported ~until Aug 2027).
            arch: x86_64
            # Native x86_64 dylib for Intel-Mac users — an arm64 dylib cannot load
            # into an x86_64 Python/R process, so Intel users genuinely need this.
            # BLAS = Homebrew OpenBLAS (make.inc auto-detects /usr/local/opt/openblas):
            # Intel dropped macOS MKL after 2023.2, and on Intel OpenBLAS's tuned x86
            # kernels match/beat Accelerate (whose edge is AMX, Apple-Silicon-only).
            # The `else` MAKEARGS branch gives USE_LIBXSMM=0 (the mac libxsmm build is
            # fragile), and make.inc's x86 default MARCH=avx2 -> -march=haswell
            # (AVX2, universal on every Intel Mac since 2013).

    steps:
      - uses: actions/checkout@v4
        # SCOTCH/METIS/SuiteSparse are vendored as plain in-tree sources,
        # not git submodules, so no submodule fetch is needed.

      # ---- Linux deps: gcc/gfortran, hwloc, numa, SCOTCH compression libs ----
      # apt path: only when NOT in a container (arm64 Linux runs on the host).
      - name: Linux system deps (apt)
        if: runner.os == 'Linux' && !matrix.container
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++ gfortran make pkg-config \
            libhwloc-dev libnuma-dev \
            zlib1g-dev libbz2-dev liblzma-dev

      # ---- manylinux_2_28 container deps (AlmaLinux 8, glibc 2.28). The image
      # already ships a C++20 gcc-toolset, gfortran, make, git and python. We
      # only add topology libs (hwloc/numa) from the powertools repo. No
      # zlib/bzip2/xz: the portable artifact builds with STILES_SCOTCH_COMPRESS=0
      # (SCOTCH file compression is unused by sTiles), so those deps are dropped.
      - name: Linux system deps (manylinux container)
        if: matrix.container
        run: |
          yum -y install dnf-plugins-core || yum -y install 'dnf-command(config-manager)'
          yum config-manager --set-enabled powertools 2>/dev/null \
            || yum config-manager --set-enabled crb 2>/dev/null || true
          yum -y install hwloc-devel numactl-devel pkgconfig which file
          # Persist the C++20 gcc-toolset onto PATH/LD_LIBRARY_PATH for EVERY
          # later step (build + smoke both compile C++20; the base gcc 8.5 can't).
          for e in /opt/rh/gcc-toolset-*/enable; do
            [ -f "$e" ] || continue
            source "$e"
            echo "$PATH" | tr ':' '\n' | grep gcc-toolset >> "$GITHUB_PATH" || true
            echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH" >> "$GITHUB_ENV"
            break
          done
          gcc --version | head -1; gfortran --version | head -1

      # ---- Linux BLAS: Intel oneAPI MKL (embedded statically into the .so) ----
      # Simpler alternative: replace this whole step with
      #   sudo apt-get install -y libopenblas-dev liblapacke-dev
      # and make.inc auto-detects OpenBLAS instead (dynamic dep, no embedding).
      - name: Install Intel MKL (Linux x86_64, apt)
        if: runner.os == 'Linux' && matrix.arch == 'x86_64' && !matrix.container
        run: |
          wget -qO- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
            | gpg --dearmor | sudo tee /usr/share/keyrings/oneapi.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/oneapi.gpg] https://apt.repos.intel.com/oneapi all main" \
            | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update
          sudo apt-get install -y intel-oneapi-mkl-devel

      # MKL in the manylinux container via Intel's yum repo. Installs to the same
      # /opt/intel/oneapi path, so the Build step's `source setvars.sh` is unchanged.
      # The static MKL .a is embedded into libstiles.so (self-contained, no runtime
      # MKL needed) and runtime-dispatches AVX2/AVX-512/AMX regardless of build host.
      - name: Install Intel MKL (manylinux container)
        if: matrix.container && matrix.arch == 'x86_64'
        run: |
          tee /etc/yum.repos.d/oneAPI.repo <<'EOF'
          [oneAPI]
          name=Intel oneAPI repository
          baseurl=https://yum.repos.intel.com/oneapi
          enabled=1
          gpgcheck=1
          repo_gpgcheck=1
          gpgkey=https://yum.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB
          EOF
          dnf -y install intel-oneapi-mkl-devel

      # ---- Linux arm64 BLAS: OpenBLAS pinned + built from source, then
      # STATICALLY EMBEDDED into libstiles.so (MKL is x86-only, so this is the
      # arm64 analog of the x86 static-MKL embed). Why from source and not the
      # distro package: the EL8 container's OpenBLAS is years old (pre-Neoverse
      # kernels), links dynamically (the consumer machine's OpenBLAS — version,
      # threading, kernels — would decide performance), and its .a is not
      # guaranteed PIC. The pinned build gives us:
      #   DYNAMIC_ARCH=1  runtime kernel dispatch (Neoverse N1/V1/N2, A57...)
      #                   regardless of build host — the arm analog of MKL's
      #                   AVX2/AVX-512 runtime dispatch
      #   USE_THREAD=0    serial BLAS: sTiles parallelizes at the tile level,
      #                   matching the sequential-MKL choice on x86
      #   USE_LOCKING=1   serial BLAS stays safe when called from many
      #                   concurrent sTiles threads
      # Cached on the pinned version, so the ~15 min build runs once.
      - name: Cache static OpenBLAS (Linux arm64)
        if: matrix.container && matrix.arch == 'arm64'
        id: cache-openblas
        uses: actions/cache@v4
        with:
          path: local/openblas
          key: openblas-${{ env.OPENBLAS_VERSION }}-serial-pic-${{ matrix.name }}
      - name: Build static OpenBLAS (Linux arm64)
        if: matrix.container && matrix.arch == 'arm64' && steps.cache-openblas.outputs.cache-hit != 'true'
        run: |
          for e in /opt/rh/gcc-toolset-*/enable; do [ -f "$e" ] && source "$e" && break; done
          git clone --depth 1 --branch "$OPENBLAS_VERSION" \
            https://github.com/OpenMathLib/OpenBLAS.git openblas-src
          make -C openblas-src -j"$(nproc)" \
            TARGET=ARMV8 DYNAMIC_ARCH=1 USE_THREAD=0 USE_OPENMP=0 USE_LOCKING=1 \
            NO_SHARED=1 > openblas-build.log 2>&1 \
            || { tail -40 openblas-build.log; exit 1; }
          make -C openblas-src install PREFIX="$PWD/local/openblas" NO_SHARED=1 \
            >> openblas-build.log 2>&1
          # The whole point is embedding into a .so — hard-fail now if the
          # archive is not PIC rather than at the (far less readable)
          # libstiles link. -shared permits undefined symbols, so only a
          # genuine PIC-relocation failure can reject it.
          t=$(mktemp)
          if ! gcc -fPIC -shared -o "$t" \
               -Wl,--whole-archive local/openblas/lib/libopenblas.a -Wl,--no-whole-archive \
               >/dev/null 2>&1; then
            rm -f "$t"
            echo "::error::libopenblas.a is not PIC-embeddable — add -fPIC to the OpenBLAS build"
            exit 1
          fi
          rm -f "$t"
          echo "OK: static serial OpenBLAS $OPENBLAS_VERSION built and PIC-verified" \
               "($(du -h local/openblas/lib/libopenblas.a | cut -f1))"

      # ---- macOS deps: gfortran + libomp + hwloc + OpenBLAS from Homebrew ----
      # BLAS = Homebrew OpenBLAS (+ lapack for the LAPACKE C interface). Apple's
      # Accelerate ships CBLAS and Fortran LAPACK but NOT LAPACKE, which sTiles
      # needs, so we use OpenBLAS (make.inc auto-detects it ahead of Accelerate).
      - name: macOS deps
        if: runner.os == 'macOS'
        run: brew install gcc libomp hwloc openblas lapack dylibbundler

      # Ground truth for the single-file embed: which STATIC archives does the
      # runner actually have, and does OpenBLAS's .a carry the LAPACKE symbols
      # sTiles needs (so we can drop the separate lapack keg)?
      - name: Probe available static archives (macOS)
        if: runner.os == 'macOS'
        run: |
          for k in libomp openblas hwloc lapack; do
            echo "== $k =="
            ls -la "$(brew --prefix $k 2>/dev/null)/lib/"*.a 2>/dev/null || echo "  (no .a shipped)"
          done
          echo "== gfortran/quadmath (from gcc) =="
          gfortran -print-file-name=libgfortran.a
          gfortran -print-file-name=libquadmath.a
          OB="$(brew --prefix openblas)/lib/libopenblas.a"
          if [ -f "$OB" ]; then
            echo "== LAPACKE symbols in libopenblas.a (want > 0) =="
            nm "$OB" 2>/dev/null | grep -c 'LAPACKE_dpotrf' || true
          fi

      # ---- Build (make.inc auto-detects platform, arch, BLAS, OpenMP) --------
      # USE_LIBXSMM=0 on macOS: libxsmm's build clones its unstable `main` branch
      # and compiles it with -Werror under the newest brew compilers, which is
      # fragile on macOS. libxsmm is an OPTIONAL selinv accelerator — without it
      # sTiles falls back to cblas_dgemm (OpenBLAS), so the build stays robust.
      - name: Build libstiles
        run: |
          # In the manylinux container the C++20 gcc-toolset may not be on PATH
          # for non-login shells; activate it explicitly (no-op elsewhere).
          for e in /opt/rh/gcc-toolset-*/enable; do [ -f "$e" ] && source "$e" && break; done
          if [ "${{ runner.os }}" = "Linux" ] && [ "${{ matrix.arch }}" = "x86_64" ]; then
            source /opt/intel/oneapi/setvars.sh || true
            # Full-static, max-portable x86_64 artifact:
            #   MARCH=avx2                 near-universal ISA (2013+); MKL/libxsmm
            #                              still runtime-dispatch AVX-512/AMX.
            #   STILES_SCOTCH_COMPRESS=0   from the job env — drops unused SCOTCH
            #                              z/bz2/lzma file deps (libbz2 soname).
            #   STILES_STATIC_CXX=1 is the default (STANDALONE_SO): embeds
            #                              libstdc++/libgcc, so no GLIBCXX floor.
            #   STILES_FMV=1               per-CPU AVX-512 clones of the hot
            #                              sTiles-own solve/selinv kernels (AVX2
            #                              default clone => can't hurt AVX2 CPUs).
            MAKEARGS="MARCH=avx2 STILES_FMV=1"
          elif [ "${{ matrix.name }}" = "linux-arm64" ]; then
            # Embed the pinned static OpenBLAS built above. sTiles-own code
            # gets make.inc's arm64 default: generic armv8-a ISA with
            # -mtune=neoverse-n1 scheduling (runs on every arm64, tuned for
            # the server cores that actually execute this artifact).
            # USE_LIBXSMM=0: skip the fragile libxsmm build on arm64.
            MAKEARGS="USE_LIBXSMM=0 OPENBLAS_STATIC_ROOT=$PWD/local/openblas"
          else
            # macOS Apple Silicon (-mcpu=apple-m1).
            # USE_LIBXSMM=0: skip the fragile libxsmm clone/build here too.
            MAKEARGS="USE_LIBXSMM=0"
          fi
          # Capture the full (very verbose) build to a file; on failure surface
          # ONLY the errors + tail so the CI log stays short and readable
          # (make echoes every ~2 KB compile command, which otherwise buries the
          # actual error past the log size limit).
          if ! make dist $MAKEARGS > build.log 2>&1; then
            echo "::group::❌ Errors"
            grep -nE "error:|fatal error:| Error [0-9]+|undefined (symbols?|reference)|ld: |Undefined symbol" build.log || true
            echo "::endgroup::"
            echo "::group::Last 40 lines of build.log"
            tail -40 build.log
            echo "::endgroup::"
            exit 1
          fi
          tail -3 build.log
          # Surface the macOS static-embed decision (buried in the verbose log).
          grep -iE 'macOS( embed probe| *:)' build.log || true

      # ---- Make the macOS dylib SELF-CONTAINED (no Homebrew needed to run) ----
      # PRIMARY: the Makefile force-loads the OpenBLAS/LAPACKE/libomp/hwloc/
      # gfortran STATIC archives INTO libstiles.dylib, so it is ONE self-contained
      # file (the macOS analog of the Linux .so embedding MKL). This step is the
      # SAFETY NET: dylibbundler catches anything the static embed missed (copies
      # it next to the dylib, @loader_path), so the artifact is always Homebrew-
      # free even mid-bring-up. The report below says whether we hit single-file
      # (0 siblings) or fell back to a bundle (N siblings = which archives the
      # embed missed). (Static-embedding libgfortran on macOS is the fragile part;
      # the net guarantees a working artifact while we converge on one file.)
      - name: Make the macOS dylib self-contained (embed + net)
        if: runner.os == 'macOS'
        run: |
          echo "::group::deps BEFORE net (after static embed)"
          otool -L dist/lib/libstiles.dylib || true
          echo "::endgroup::"
          # libstiles.so is a symlink to the dylib; operate on the real file.
          # </dev/null: if dylibbundler can't resolve a dep it prompts for a
          # path interactively; EOF turns that would-be hang into a fast fail.
          dylibbundler --overwrite-files --bundle-deps --create-dir \
            --fix-file dist/lib/libstiles.dylib \
            --dest-dir dist/lib \
            --install-path @loader_path/ </dev/null
          # dylibbundler can leave a DUPLICATE '@loader_path/' LC_RPATH that
          # Sonoma+ dyld rejects ("duplicate LC_RPATH"). Deps are referenced via
          # @loader_path/ in the load command itself (no rpath needed), so strip
          # every @loader_path rpath from each dylib, then re-ad-hoc-sign (arm64
          # requires a valid signature after any load-command edit).
          for f in dist/lib/*.dylib; do
            while install_name_tool -delete_rpath @loader_path/ "$f" 2>/dev/null; do :; done
            codesign -f -s - "$f" >/dev/null 2>&1 || true
          done
          echo "::group::deps AFTER net"
          otool -L dist/lib/libstiles.dylib
          ls -lh dist/lib/
          echo "::endgroup::"
          # Single-file report: siblings = deps the static embed did NOT swallow.
          siblings=$(ls dist/lib/*.dylib 2>/dev/null | grep -v '/libstiles\.dylib$' || true)
          if [ -z "$siblings" ]; then
            echo "✅ SINGLE FILE: libstiles.dylib embeds every dependency."
          else
            echo "⚠️  bundled as siblings (static embed missed these):"; echo "$siblings"
          fi
          # Hard requirement (either way): no absolute third-party path remains,
          # in the dylib OR any bundled dependency.
          if otool -L dist/lib/*.dylib | grep -E '/opt/homebrew|/usr/local/(opt|Cellar)|/opt/intel'; then
            echo "::error::a third-party dylib dependency is still referenced by absolute path"
            exit 1
          fi
          echo "OK: macOS dylib is self-contained (system libs only; no Homebrew)"
          # Drop the libstiles.so compatibility symlink from the artifact: on
          # macOS the loadable file is libstiles.dylib, and upload-artifact would
          # dereference the symlink into a full duplicate of the dylib.
          rm -f dist/lib/libstiles.so

      - name: Sanity check the built library
        run: |
          ls -lh dist/lib/
          if [ "${{ runner.os }}" = "macOS" ]; then otool -L dist/lib/libstiles.dylib; \
          else ldd dist/lib/libstiles.so; fi

      # Portability guard for the manylinux artifacts (x86_64 AND arm64): prove
      # the glibc floor and the full-static self-containment actually held
      # (catches a host-lib leak or a regressed link flag before we ship).
      - name: Verify portability floor (manylinux artifact)
        if: matrix.container
        run: |
          so=dist/lib/libstiles.so
          floor=$(objdump -T "$so" | grep -oE 'GLIBC_2\.[0-9]+' | sort -uV | tail -1)
          echo "glibc floor: ${floor:-none}"
          case "${floor:-GLIBC_2.0}" in
            GLIBC_2.2[0-8]|GLIBC_2.1?|GLIBC_2.0) : ;;   # <= 2.28 ok
            *) echo "::error::glibc floor ${floor} exceeds 2.28 — a host lib leaked into the build"; exit 1 ;;
          esac
          echo "== runtime deps =="; ldd "$so" || true
          # Full-static invariants — the actual cross-distro KILLERS must be gone:
          #   libstdc++.so  -> would reimpose a GLIBCXX_3.4.3x floor
          #   libbz2/liblzma -> RHEL vs Debian soname mismatch (.so.1 vs .so.1.0)
          # NOT libz: its soname (libz.so.1) is identical on every distro and it
          # is pulled transitively by the (universal) libhwloc, so it is fine.
          # numa/hwloc/gfortran/gomp/quadmath/gcc_s stay dynamic here — standard,
          # universally-available, low-glibc runtime libs (README prerequisites).
          if ldd "$so" | grep -qE 'libstdc\+\+\.so|libbz2\.so|liblzma\.so'; then
            echo "::error::a dep that should be static/dropped is still dynamic (libstdc++/bz2/lzma)"; exit 1
          fi
          # arm64: the pinned OpenBLAS must be EMBEDDED — a dynamic libopenblas
          # NEEDED entry would hand performance back to whatever OpenBLAS the
          # consumer machine happens to have (or fail to load where none exists).
          if [ "${{ matrix.arch }}" = "arm64" ] && ldd "$so" | grep -q 'libopenblas'; then
            echo "::error::libopenblas is a dynamic dep — the static embed regressed"; exit 1
          fi
          echo "OK: glibc floor $floor (<= 2.28), no libstdc++/bz2/lzma dynamic deps"

      # Prove the library actually WORKS on this OS/arch (not just that it
      # compiled): factorize + logdet + selinv + solve on a few matrices and
      # gate on the solve residual. `make dist` already produced lib/libstiles.*.
      # The timing table (+ CPU model — hosted x86 runners are randomly Intel
      # Xeon or AMD EPYC, which matters when reading MKL numbers) goes to the
      # run summary page, so speed across commits needs no log digging.
      - name: Smoke test (speed + correctness)
        run: |
          set -o pipefail   # ./run.sh must still gate the job through the tee
          if [ "${{ runner.os }}" = "Linux" ]; then source /opt/intel/oneapi/setvars.sh || true; fi
          if [ "${{ matrix.name }}" = "linux-arm64" ]; then
            export OPENBLAS_STATIC_ROOT="$PWD/local/openblas"   # bench.inc BLAS link
          fi
          # Branch on OS: with -e + pipefail active, a missing lscpu on macOS
          # would fail the assignment itself (pipeline status 127) and kill the
          # step before any fallback line runs.
          if [ "${{ runner.os }}" = "macOS" ]; then
            CPU="$(sysctl -n machdep.cpu.brand_string 2>/dev/null || echo unknown)"
          else
            CPU="$(lscpu 2>/dev/null | sed -n 's/^Model name:[[:space:]]*//p' | head -1 || true)"
            [ -n "$CPU" ] || CPU=unknown
          fi
          cd bench
          ./run.sh | tee speed.txt
          {
            echo "### ${{ matrix.name }} speed"
            echo "CPU: $CPU"
            echo '```'
            cat speed.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # Nested parallelism: run several Cholesky factorizations CONCURRENTLY,
      # each on its own cores (the nested-groups pattern). Checks every call
      # returns the same logdet and reports the serial-vs-concurrent speedup.
      # Kept modest (<= runner core count) so concurrency is real, not
      # oversubscribed: hosted runners have ~3-4 cores.
      - name: Parallel factorization test (concurrent chols)
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then source /opt/intel/oneapi/setvars.sh || true; fi
          if [ "${{ matrix.name }}" = "linux-arm64" ]; then
            export OPENBLAS_STATIC_ROOT="$PWD/local/openblas"   # bench.inc BLAS link
          fi
          export OMP_STACKSIZE=256M   # big OMP-thread stack (macOS default backend)
          cd bench
          make -s parallel_chol
          echo "### 2 concurrent factorizations x 2 cores each"
          ./parallel_chol mats/ferris.mtx 2 2
          echo "### 4 concurrent factorizations x 1 core each"
          ./parallel_chol mats/ferris.mtx 4 1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libstiles-${{ matrix.name }}
          path: |
            dist/lib/libstiles.*
            dist/lib/*.dylib
            dist/include/stiles.h
            dist/lib/pkgconfig/stiles.pc

  # Regression guard: build libstiles with AddressSanitizer on Apple Silicon and
  # run the ordering-only driver on spacetime under ASan. This is the matrix that
  # exposed the arm64 SCOTCH bug (the opaque SCOTCH_Ordering blob in scotch.h was
  # sized on Linux, 24 B too small for macOS where LibOrder embeds a bigger
  # pthread_mutex_t -> stack overflow at -O2/-O3). Fixed by bumping dummy[17]->
  # dummy[24]; this job stays as a guard so a future SCOTCH/scotch.h change that
  # re-introduces the undersize is caught here. Non-gating (continue-on-error).
  macos-asan-scotch:
    name: macos-asan-scotch-diagnostic
    runs-on: macos-14           # Apple Silicon
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: deps
        run: brew install gcc libomp hwloc openblas lapack
      - name: Build libstiles with AddressSanitizer
        run: make BUILD=sanitize USE_LIBXSMM=0 all
      - name: Build order_only (ASan) and run spacetime ordering
        run: |
          cd bench
          # Match the library's ASan so the runtime is consistent across the .dylib boundary.
          clang++ -std=c++20 -O1 -g -fsanitize=address -fno-omit-frame-pointer \
            -I../tools/include -o order_only order_only.cpp \
            -L../lib -lstiles -Wl,-rpath,../lib
          export ASAN_OPTIONS="detect_leaks=0:abort_on_error=1:halt_on_error=1:symbolize=1"
          echo "::group::ASan — spacetime ordering (SCOTCH overflow expected here)"
          STILES_SCOTCH_CTX=0 ./order_only mats/spacetime.mtx 1 40 || true
          echo "::endgroup::"
          echo "::group::ASan — spacetime with SCOTCH context ON"
          STILES_SCOTCH_CTX=1 ./order_only mats/spacetime.mtx 1 40 || true
          echo "::endgroup::"

  # PERFORMANCE diagnostic (non-gating): build against Apple's Accelerate
  # framework instead of OpenBLAS and run the same speed table. Accelerate's
  # BLAS runs on the M-series AMX matrix units, which OpenBLAS cannot reach,
  # and is commonly 2-4x faster on the mid-size dgemm sTiles feeds it — but
  # sTiles needs LAPACKE, which Accelerate historically lacked (the reason the
  # shipped artifact uses OpenBLAS). This job MEASURES both questions at once:
  # if the build fails, the summary shows the exact LAPACKE gap a shim would
  # have to cover; if it succeeds, compare its speed table with the
  # macos-apple-arm64 job's (same runner class) to decide whether the shipped
  # macOS artifact should switch BLAS.
  macos-accelerate-bench:
    name: macos-accelerate-bench-diagnostic
    runs-on: macos-14
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      # Deliberately NO openblas/lapack: make.inc's STILES_FORCE_ACCELERATE
      # knob skips BLAS detection outright, and bench.inc falls back to
      # -framework Accelerate when Homebrew OpenBLAS is absent — so the
      # library AND the bench binaries genuinely run on Accelerate.
      - name: deps
        run: brew install gcc libomp hwloc
      - name: Build libstiles against Accelerate
        run: |
          if ! make all USE_LIBXSMM=0 STILES_FORCE_ACCELERATE=1 > build.log 2>&1; then
            {
              echo '### Accelerate build: FAILED — this is the LAPACKE gap a shim must cover'
              echo '```'
              grep -nE 'error:|fatal error:|Undefined symbol|ld: ' build.log | head -30
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::group::build.log tail"; tail -40 build.log; echo "::endgroup::"
            exit 1
          fi
          tail -3 build.log
      - name: Speed table on Accelerate
        run: |
          set -o pipefail
          cd bench
          ./run.sh | tee accel_speed.txt
          {
            echo '### macOS Accelerate (AMX) speed — compare with the macos-apple-arm64 table'
            echo '```'
            cat accel_speed.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # Windows portability PROBE (diagnostic, non-gating). Compile-checks sTiles'
  # OWN C++ sources with the MinGW-w64 UCRT64 toolchain (x86_64-w64-mingw32ucrt-*,
  # the standard Rtools44 toolchain). It does NOT build a .dll and runs nothing:
  # it reports which sTiles sources still assume Linux/POSIX (ungated
  # sched_setaffinity / numa / mmap / dlopen ...) and so must be gated before a
  # Windows build is possible. This is how we MEASURE the gap; it is not the
  # port. continue-on-error so the full error list surfaces instead of blocking
  # CI. BLAS here is MSYS2's OpenBLAS (headers only — the probe is syntax-only,
  # no link); a real Windows build provides Windows MKL/OpenBLAS at its own
  # final link.
  windows-mingw-probe:
    name: windows-mingw-probe-diagnostic
    runs-on: windows-latest
    continue-on-error: true
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - name: Set up MSYS2 UCRT64 (MinGW-w64 — the UCRT64 / Rtools44 Windows toolchain)
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            make
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-gcc-fortran
            mingw-w64-ucrt-x86_64-openblas
            mingw-w64-ucrt-x86_64-hwloc
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-python
      - name: Show toolchain + resolved build config
        run: |
          g++ --version | head -1
          # Which Windows compiler macros does this toolchain define? (settles
          # whether __MINGW32__ / _MSC_VER gating is correct.) Echo to the run
          # SUMMARY page so it needs no log-digging.
          echo '### MinGW toolchain macros' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo | g++ -dM -E -x c++ - | grep -iE '__MINGW|_MSC_VER|__UCRT|_WIN32|_WIN64' | sort | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          make show-config USE_LIBXSMM=0 || true
      - name: Compile probe — sTiles-own sources under MinGW (syntax-only)
        run: |
          # Prove which commit we are building — rules out stale/old-code runs.
          # (msys2 shell has no git; use the SHA GitHub injects.)
          SHA="${GITHUB_SHA:0:7}"
          echo "probe building commit: $SHA"
          make cross-syntax USE_LIBXSMM=0 | tee probe.out
          # Put the result straight on the run summary page (no log hunting).
          echo '### Windows / MinGW compile probe' >> "$GITHUB_STEP_SUMMARY"
          echo "commit \`$SHA\`" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -E 'compiled clean|^  FAIL ' probe.out >> "$GITHUB_STEP_SUMMARY" || echo '(no tally)' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Surface the Windows portability gap
        if: always()
        run: |
          echo "::group::MinGW compiler errors (cross-syntax.err)"
          if [ -s cross-syntax.err ]; then cat cross-syntax.err; \
          else echo "(no errors — every sTiles-own source compiled under MinGW)"; fi
          echo "::endgroup::"
      - name: Upload probe log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-mingw-probe-log
          path: cross-syntax.err
          if-no-files-found: ignore

      # ---- Attempt a REAL Windows build: compile EVERYTHING (sTiles + vendored
      # SCOTCH/METIS/GKlib/SuiteSparse + Fortran ordering) and LINK libstiles.dll.
      # This is the layer beyond the syntax probe; expect iteration on the
      # vendored / Fortran / link surface. Non-gating: surfaces the first errors
      # so we can fix them like we did the compile gap. On success, uploads the
      # .dll + a minimal smoke test (factor a small matrix) proving it runs.
      - name: Attempt real Windows build (libstiles.dll)
        if: always()
        run: |
          echo '### Windows build (make all -> libstiles.dll)' >> "$GITHUB_STEP_SUMMARY"
          if make all USE_LIBXSMM=0 > winbuild.log 2>&1; then
            echo "✅ libstiles.dll linked" | tee -a "$GITHUB_STEP_SUMMARY"
            ls -lh lib/libstiles.* 2>/dev/null
          else
            echo "❌ build not linking yet (bring-up) — first errors:"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            grep -nE 'error:|fatal error:| Error [0-9]+|undefined reference|ld:|cannot find -l' winbuild.log | head -30 | tee -a "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "::group::winbuild.log tail"; tail -40 winbuild.log; echo "::endgroup::"
          fi
      # Prove the DLL actually RUNS: load it with ctypes (LoadLibrary — no
      # compile-time import table, so MinGW auto-import / pseudo-relocs are
      # physically impossible) and factor ferris. This is how pysTiles/R use it.
      # We copy libstiles.dll AND its UCRT64 runtime deps next to smoke.py so
      # os.add_dll_directory(cwd) resolves the whole dependency chain.
      - name: Smoke test the Windows dll (ctypes, factor ferris)
        if: always()
        run: |
          [ -f lib/libstiles.dll ] || { echo "no dll — skipping smoke"; exit 0; }
          cp lib/libstiles.dll bench/
          # Copy every non-system dep of the DLL (the /ucrt64 ones) beside it.
          ldd lib/libstiles.dll | awk '/ucrt64/ {print $3}' | xargs -r -I{} cp {} bench/ || true
          cd bench
          echo "### Windows smoke (ctypes, factor ferris)" >> "$GITHUB_STEP_SUMMARY"
          if python smoke.py mats/ferris.mtx | tee smoke.out; then
            echo "✅ DLL loads + factors ferris on Windows (ctypes)" | tee -a "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ ctypes smoke failed" | tee -a "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload Windows dll (if built)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: libstiles-windows-x86_64
          path: |
            lib/libstiles.dll
            lib/libstiles.dll.a
            tools/include/stiles.h
          if-no-files-found: ignore

  # PERFORMANCE diagnostic (non-gating, manual only): MKL vs OpenBLAS on the
  # SAME runner. Hosted x86 runners are randomly Intel Xeon or AMD EPYC, and
  # MKL's kernel dispatch on AMD is historically conservative — so the shipped
  # MKL-embedded artifact may be leaving speed on the table for AMD users.
  # Run this a few times from the Actions tab (the CPU model heads each
  # summary) and compare tables per vendor; if OpenBLAS wins on EPYC, ship a
  # second linux-x86_64-openblas artifact. Both passes build sTiles-own code
  # identically (MARCH=avx2 STILES_FMV=1) so BLAS is the only variable.
  # ORDER MATTERS: the OpenBLAS pass runs BEFORE MKL is installed — once MKL
  # exists under /opt/intel, make.inc and bench.inc would prefer it and the
  # dynamic loader could resolve BLAS symbols against it, contaminating the
  # OpenBLAS measurement.
  linux-x86-blas-compare:
    name: linux-x86-blas-compare-diagnostic
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++ gfortran make pkg-config libhwloc-dev libnuma-dev \
            zlib1g-dev libbz2-dev liblzma-dev \
            libopenblas-dev liblapacke-dev
      - name: Pass 1 — OpenBLAS (before MKL exists on the machine)
        run: |
          set -o pipefail
          CPU="$(lscpu | sed -n 's/^Model name:[[:space:]]*//p' | head -1)"
          echo "### MKL vs OpenBLAS — $CPU" >> "$GITHUB_STEP_SUMMARY"
          make all MARCH=avx2 STILES_FMV=1 USE_OPENBLAS=1 > ob_build.log 2>&1 \
            || { tail -30 ob_build.log; exit 1; }
          ( cd bench && ./run.sh | tee ../ob_speed.txt )
          {
            echo '#### OpenBLAS (Ubuntu package; sTiles pins it to 1 thread)'
            echo '```'; cat ob_speed.txt; echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Install Intel MKL
        run: |
          wget -qO- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
            | gpg --dearmor | sudo tee /usr/share/keyrings/oneapi.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/oneapi.gpg] https://apt.repos.intel.com/oneapi all main" \
            | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update
          sudo apt-get install -y intel-oneapi-mkl-devel
      - name: Pass 2 — MKL (the shipped x86_64 configuration)
        run: |
          set -o pipefail
          source /opt/intel/oneapi/setvars.sh || true
          make cleanall >/dev/null 2>&1 || true
          rm -f bench/speedtest bench/parallel_chol
          make all MARCH=avx2 STILES_FMV=1 > mkl_build.log 2>&1 \
            || { tail -30 mkl_build.log; exit 1; }
          ( cd bench && ./run.sh | tee ../mkl_speed.txt )
          {
            echo '#### MKL (sequential — the shipped x86_64 configuration)'
            echo '```'; cat mkl_speed.txt; echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # GATING test: prove every BLAS override knob RESOLVES to the right backend,
  # and that an overridden build actually runs (factors ferris). Hosted runners
  # have no ARMPL/SVE/AMD-specific hardware, so what cannot be exercised for
  # real is exercised at the CONFIG level with fake install trees — detection
  # and precedence are pure make.inc parse logic, identical on every arch —
  # while the combinations that do exist on the runner (OpenBLAS on Linux,
  # OpenBLAS/Accelerate resolution on macOS) also build + run. Fast and
  # deterministic, so unlike the *-diagnostic jobs this one gates CI.
  blas-override-tests:
    name: blas-override-tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@v4
      - name: deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++ gfortran make pkg-config libhwloc-dev libnuma-dev \
            zlib1g-dev libbz2-dev liblzma-dev libopenblas-dev liblapacke-dev
      - name: deps (macOS)
        if: runner.os == 'macOS'
        run: brew install gcc libomp hwloc openblas lapack
      - name: Override-resolution asserts (fake install trees, config level)
        run: |
          # Fake installs: make.inc's detection is wildcard/header probing at
          # parse time, so a touched header + lib file IS an install to it.
          FAKE="$RUNNER_TEMP/fake"
          mkdir -p "$FAKE/mkl/include" "$FAKE/ob/lib" "$FAKE/ob/include" \
                   "$FAKE/armpl/include" "$FAKE/armpl/lib"
          touch "$FAKE/mkl/include/mkl.h" "$FAKE/ob/lib/libopenblas.a" \
                "$FAKE/armpl/include/armpl.h" "$FAKE/armpl/lib/libarmpl.so"
          check() {  # check <expected-substring> [make args...]
            want="$1"; shift
            out="$(make show-config "$@" 2>&1)" \
              || { echo "$out" | tail -20; echo "::error::make show-config $* failed"; exit 1; }
            echo "$out" | grep -qF "$want" \
              || { echo "$out" | head -25; echo "::error::[$*] did not resolve to: $want"; exit 1; }
            echo "OK: [$*] -> $want"
          }
          if [ "${{ runner.os }}" = "Linux" ]; then
            check 'Intel MKL detected'                 MKLROOT="$FAKE/mkl"
            # The override must BEAT auto-detection, not just work alone:
            check 'OpenBLAS detected'                  MKLROOT="$FAKE/mkl" USE_OPENBLAS=1
            check 'static OpenBLAS'                    MKLROOT="$FAKE/mkl" OPENBLAS_STATIC_ROOT="$FAKE/ob"
            # arm64 selection is plain make text — simulate the arch:
            check 'ARM Performance Libraries detected' UNAME_M=aarch64 ARMPL_DIR="$FAKE/armpl"
            check 'OpenBLAS detected'                  UNAME_M=aarch64 ARMPL_DIR="$FAKE/armpl" USE_OPENBLAS=1
            check 'hint: on SVE CPUs'                  UNAME_M=aarch64 USE_OPENBLAS=1
          else
            check 'OpenBLAS detected'
            check 'Accelerate framework FORCED'        STILES_FORCE_ACCELERATE=1
            check 'ARM Performance Libraries detected' ARMPL_DIR="$FAKE/armpl"
            # Forced Accelerate must beat an installed ARMPL:
            check 'Accelerate framework FORCED'        ARMPL_DIR="$FAKE/armpl" STILES_FORCE_ACCELERATE=1
            check 'hint: Apple'"'"'s Accelerate'
          fi
      # The overridden configuration must not just resolve — it must WORK.
      # Linux: force OpenBLAS (the non-default there) and factor ferris.
      # macOS functional coverage lives in the build lane (OpenBLAS, full
      # bench) and macos-accelerate-bench (Accelerate) — not duplicated here.
      # USE_LIBXSMM=0 keeps this quick; the BLAS knob is what's under test.
      - name: Functional — overridden build factors ferris (Linux, USE_OPENBLAS=1)
        if: runner.os == 'Linux'
        run: |
          set -o pipefail
          make all USE_OPENBLAS=1 USE_LIBXSMM=0 > build.log 2>&1 \
            || { echo "::group::build errors"; grep -nE 'error:|undefined reference|ld: ' build.log | head -20; tail -20 build.log; echo "::endgroup::"; exit 1; }
          cd bench && ./run.sh mats/ferris.mtx | tee ferris.txt
          { echo '### blas-override-tests: Linux USE_OPENBLAS=1 — ferris'
            echo '```'; cat ferris.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"

  # On v* tags: attach every built artifact to the GitHub Release, so users
  # download libstiles from the Releases page instead of fishing 90-day
  # workflow artifacts out of Actions runs. Uses the preinstalled gh CLI (no
  # third-party release action). The Windows probe's dll (if any) is picked up
  # too when it finished before this job; it is diagnostic, so not waited on.
  release:
    name: release (attach artifacts)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: libstiles-*
          path: artifacts
      - name: Pack one tarball per platform
        run: |
          cd artifacts
          for d in libstiles-*/; do
            n="${d%/}"
            tar czf "${n}-${GITHUB_REF_NAME}.tar.gz" -C "$d" .
          done
          ls -lh *.tar.gz
      - name: Create or update the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" --generate-notes artifacts/*.tar.gz \
            || gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --clobber artifacts/*.tar.gz
